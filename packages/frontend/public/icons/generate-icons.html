<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate PWA Icons</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
    canvas { border: 1px solid #ccc; margin: 0.5rem; }
    .icons { display: flex; gap: 1rem; flex-wrap: wrap; align-items: end; }
    button { padding: 0.5rem 1rem; margin-top: 1rem; cursor: pointer; }
    a { display: inline-block; margin: 0.5rem; }
  </style>
</head>
<body>
  <h1>PWA Icon Generator - Smart Attendance</h1>
  <p>Click "Generate" then right-click each canvas to save as PNG, or use the download links.</p>
  <button onclick="generate()">Generate Icons</button>
  <div class="icons" id="icons"></div>
  <div id="links"></div>

  <script>
    const sizes = [
      { name: 'icon-192', size: 192, maskable: false },
      { name: 'icon-512', size: 512, maskable: false },
      { name: 'icon-maskable', size: 512, maskable: true },
    ];

    function drawIcon(canvas, size, maskable) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;

      // Background
      ctx.fillStyle = '#2563eb';
      if (maskable) {
        // Maskable icons need full bleed background
        ctx.fillRect(0, 0, size, size);
      } else {
        // Regular icon with rounded corners
        const r = size * 0.15;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fill();
      }

      // Clock circle
      const cx = size / 2;
      const cy = size * 0.42;
      const clockR = size * 0.22;

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = size * 0.02;
      ctx.beginPath();
      ctx.arc(cx, cy, clockR, 0, Math.PI * 2);
      ctx.stroke();

      // Clock hands
      ctx.lineCap = 'round';
      // Hour hand
      ctx.lineWidth = size * 0.025;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx, cy - clockR * 0.55);
      ctx.stroke();
      // Minute hand
      ctx.lineWidth = size * 0.018;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + clockR * 0.5, cy);
      ctx.stroke();

      // Check mark below clock
      const checkY = size * 0.72;
      const checkSize = size * 0.12;
      ctx.strokeStyle = '#34d399';
      ctx.lineWidth = size * 0.03;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - checkSize, checkY);
      ctx.lineTo(cx - checkSize * 0.3, checkY + checkSize * 0.7);
      ctx.lineTo(cx + checkSize, checkY - checkSize * 0.5);
      ctx.stroke();

      // Text
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 0.07}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('SMART ATTEND', cx, size * 0.9);
    }

    function generate() {
      const container = document.getElementById('icons');
      const links = document.getElementById('links');
      container.innerHTML = '';
      links.innerHTML = '<h3>Download links:</h3>';

      sizes.forEach(({ name, size, maskable }) => {
        const canvas = document.createElement('canvas');
        drawIcon(canvas, size, maskable);

        const label = document.createElement('div');
        label.innerHTML = `<strong>${name} (${size}x${size})</strong>`;
        const wrapper = document.createElement('div');
        wrapper.appendChild(label);
        wrapper.appendChild(canvas);
        container.appendChild(wrapper);

        const link = document.createElement('a');
        link.download = `${name}.png`;
        link.href = canvas.toDataURL('image/png');
        link.textContent = `Download ${name}.png`;
        links.appendChild(link);
      });
    }
  </script>
</body>
</html>
